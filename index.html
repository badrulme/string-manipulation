<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java properties key to variable</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="container">
        <header class="mb-3">
            <nav class="navbar navbar-expand-lg bg-light">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">String Manipulation</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li>
                                <span style="font-style:italic;font-size: 13px;">
                                    This tools help you to convert Java .properteis key to static variable!
                                </span>
                            </li>
                        </ul>
                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                            <button class="btn btn-outline-success" type="submit">Search</button>
                        </form>
                    </div>
                </div>
            </nav>
        </header>
        <section>
            <div class="row">
                <div class="col-md-6">
                    <div id="text_input">
                        <div class="card">
                            <div class="card-header">
                                <div class="float-start">.properteis key(s)</div>
                                <div class="float-end">
                                    <i onclick="inputTextClear()" style="cursor:pointer;" class="fa fa-eraser"
                                        aria-hidden="true"></i>
                                    <i onclick="copyInputText()" style="cursor:pointer;" class="fa fa-clone"
                                        aria-hidden="true"></i>
                                </div>
                            </div>
                            <div class="card-body">
                                <div>
                                    <textarea onkeyup="textTransform()" spellcheck="false" class="form-control"
                                        id="input_textarea" rows="5"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div id="text_output">
                        <div class="card">
                            <div class="card-header">
                                <div class="float-start">Static variable</div>
                                <div class="float-end">
                                    <i onclick="outputTextClear()" style="cursor:pointer;" class="fa fa-eraser"
                                        aria-hidden="true"></i>
                                    <i onclick="copyOutputText()" style="cursor:pointer;" class="fa fa-clone"
                                        aria-hidden="true"></i>
                                </div>
                            </div>
                            <div class="card-body">
                                <textarea readonly spellcheck="false" class="form-control" id="output_textarea"
                                    rows="5"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <footer class="mt-3">
            <p class="text-center" style="color: #77797be0;font-size: 15px;">This tools developed and maintaining by Md.
                Badrul Alam! <a href="mailto:hridoyjbd@gmail.com"> hridoyjbd@gmail.com</a></p>
        </footer>

    </div>

    <script>
        function copyOutputText() {
            var copyText = document.getElementById("output_textarea");
            // Select the text field
            copyText.select();
            copyText.setSelectionRange(0, 99999); // For mobile devices

            // Copy the text inside the text field
            navigator.clipboard.writeText(copyText.value);
        }
        function copyInputText() {
            var copyText = document.getElementById("input_textarea");
            // Select the text field
            copyText.select();
            copyText.setSelectionRange(0, 99999); // For mobile devices

            // Copy the text inside the text field
            navigator.clipboard.writeText(copyText.value);
        }
        function inputTextClear() {
            var copyText = document.getElementById("input_textarea");
            copyText.value = '';
        }
        function outputTextClear() {
            var copyText = document.getElementById("output_textarea");
            copyText.value = '';
        }

        function textTransform() {

            let outputText = "";
            const inputElement = document.getElementById("input_textarea");
            let outputElement = document.getElementById("output_textarea");

            let inputText = inputElement.value.trim();
            if (inputText.length > 0) {
                let splitArray = inputText.split(/[\n|\r]/);
                // console.log(splitArray);

                splitArray.forEach(text => {
                    text = text.trim();
                    if (text.length > 0) {
                        let lineText = text;
                        outputText += 'public static final String '
                            + lineText.replaceAll('.', '_').toUpperCase() + ' = "'
                            + lineText + '";\n';
                    }

                    console.log(text);
                });

                if (outputText.trim().length > 0) {
                    outputElement.value = outputText;
                }

            }
        }
    </script>
</body>

</html>
